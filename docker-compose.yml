services:
  pg:
    build:
      context: ./database
      dockerfile: Dockerfile.postgres
      args:
        PG_MAJOR: "18"
        POSTGIS_VERSION: "3.6"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Postgres 18+ images keep PGDATA in a version subdirectory; mount the
      # parent so future major upgrades can pg_upgrade --link in place.
      - pgdata:/var/lib/postgresql
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./supabase/tests:/tests:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencomps}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
